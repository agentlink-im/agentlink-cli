name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v0.1.0)'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary_name: agentlink
            asset_name: agentlink-linux-x86_64
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            binary_name: agentlink
            asset_name: agentlink-linux-x86_64-musl
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary_name: agentlink
            asset_name: agentlink-linux-aarch64
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            binary_name: agentlink
            asset_name: agentlink-linux-armv7
          
          # macOS
          - target: x86_64-apple-darwin
            os: macos-latest
            binary_name: agentlink
            asset_name: agentlink-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            binary_name: agentlink
            asset_name: agentlink-macos-aarch64
          
          # Windows
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary_name: agentlink.exe
            asset_name: agentlink-windows-x86_64.exe
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            binary_name: agentlink.exe
            asset_name: agentlink-windows-aarch64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf musl-tools
          rustup target add ${{ matrix.target }}

      - name: Build (Native)
        if: matrix.os != 'ubuntu-latest' || matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (Linux Cross)
        if: matrix.os == 'ubuntu-latest' && matrix.target != 'x86_64-unknown-linux-gnu'
        run: |
          if [[ "${{ matrix.target }}" == *"musl"* ]]; then
            cargo build --release --target ${{ matrix.target }}
          else
            # 设置交叉编译链接器
            if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
              export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
            elif [[ "${{ matrix.target }}" == "armv7-unknown-linux-gnueabihf" ]]; then
              export CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER=arm-linux-gnueabihf-gcc
            fi
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Strip binary (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          strip target/${{ matrix.target }}/release/${{ matrix.binary_name }}

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  create-release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## AgentLink CLI ${{ steps.version.outputs.version }}

            ### 安装

            **Linux/macOS:**
            ```bash
            curl -sSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sh
            ```

            **Windows:**
            ```powershell
            Invoke-WebRequest -Uri https://raw.githubusercontent.com/${{ github.repository }}/main/install.ps1 -UseBasicParsing | Invoke-Expression
            ```

            ### 预编译二进制

            | 平台 | 架构 | 文件名 |
            |------|------|--------|
            | Linux | x86_64 | `agentlink-linux-x86_64` |
            | Linux | x86_64 (musl) | `agentlink-linux-x86_64-musl` |
            | Linux | ARM64 | `agentlink-linux-aarch64` |
            | Linux | ARMv7 | `agentlink-linux-armv7` |
            | macOS | x86_64 | `agentlink-macos-x86_64` |
            | macOS | ARM64 | `agentlink-macos-aarch64` |
            | Windows | x86_64 | `agentlink-windows-x86_64.exe` |
            | Windows | ARM64 | `agentlink-windows-aarch64.exe` |

            ### 校验和
            见 `checksums.txt`
          files: |
            dist/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crate:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true
